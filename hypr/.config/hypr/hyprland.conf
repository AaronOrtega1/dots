# You have to change this based on your monitor
monitor=,preferred,auto,auto
monitor=eDP-1,preferred,auto,1.5

# Status bar :)
# exec-once=eww open bar
exec-once=waybar

#Notification
exec-once=dunst
# Wallpaper
exec-once=hyprpaper
# For screen sharing
exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# For keyboard
exec-once=fcitx5 -D
# For lockscreen
# exec-once=swayidle -w timeout 200 'swaylock-fancy'
# Start Page
exec-once=~/.config/hypr/scripts/startpage.sh

# Bluetooth
exec-once=blueman-applet # Make sure you have installed blueman

# Screen Sharing
exec-once=systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once=~/.config/hypr/scripts/screensharing.sh

source=$HOME/.config/hypr/current-theme.conf

input {
    kb_layout = us
    kb_variant = intl
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hyprland.org/Configuring/Keywords/#executing

device {
    name = epic mouse V1
    sensitivity = -0.5
}

# See https://wiki.hyprland.org/Configuring/Variables/

# gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
# }

general {
    gaps_in = 2
    gaps_out = 8

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border=$active_border
    col.inactive_border=$inactive_border

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle

}

decoration {
    rounding = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    # blur {
    #     enabled = true
    #     size = 3
    #     passes = 1
    #
    #     vibrancy = 0.1696
    # }
}

# Blur for waybar
blurls=lockscreen


animations {
    enabled = false

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

master {
  new_on_top=true
}

misc {
  disable_hyprland_logo=true
  disable_splash_rendering=true
  mouse_move_enables_dpms=true
  vfr = false
}


# Float Necessary Windows
windowrule = match:class rofi, match:float yes
windowrule = match:title ^(Save Image)$, match:float yes
windowrule = size 800 600, match:title ^(Save Image)$
# windowrule = match:class rofi, match:center yes

# windowrule = match: title ^(Picture in picture)$, match:float yes
# windowrule = match:float,class:^(org.pulseaudio.pavucontrol)$,title:^(Volume Control)$
# windowrule = match:float,class:^()$,title:^(Picture in picture)$
# windowrule = match:float,class:^(zen)$,title:^(Enter name of file)$
# windowrule = match:float,class:^(zen)$,title:^(Save Image)$
# windowrule = match:float,class:^(blueman-manager)$
# windowrule = match:float,class:^(org.twosheds.iwgtk)$
# windowrule = match:float,class:^(blueberry.py)$
# windowrule = match:float,class:^(xdg-desktop-portal-gtk)$
# windowrule = match:float,class:^(geeqie)$

#sources
source = ~/.config/hypr/keybindings.conf 
